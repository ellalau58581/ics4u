<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Forms</title>
  </head>
  <body>
    <header>
      <h1>HTML Forms</h1>
    </header>
    <main>
      <form>
        <fieldset>
          <legend>Text Inputs</legend>
          <input type="text" placeholder="Text input" />
          <br /><br />
          <input type="email" placeholder="Email input" />
          <br /><br />
          <input type="password" placeholder="Password input" />
          <br /><br />
          <input type="number" placeholder="Number input" />
          <br /><br />
          <input type="tel" placeholder="Telephone input" />
          <br /><br />
          <input type="url" placeholder="URL input" />
          <br /><br />
          <input type="search" placeholder="Search input" />
        </fieldset>
        <br />
        <fieldset>
          <legend>Date & Time Inputs</legend>
          <input type="date" />
          <br /><br />
          <input type="time" />
          <br /><br />
          <input type="datetime-local" />
          <br /><br />
          <input type="month" />
          <br /><br />
          <input type="week" />
        </fieldset>
        <br />
        <fieldset>
          <legend>Selection Inputs</legend>
          <input type="radio" name="choice" /> Option 1
          <input type="radio" name="choice" /> Option 2 <br /><br />
          <input type="checkbox" /> Checkbox 1
          <input type="checkbox" /> Checkbox 2 <br /><br />
          <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
          </select>
        </fieldset>
        <br />
        <fieldset>
          <legend>Buttons</legend>
          <button type="button">Button</button>
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </fieldset>
        <br />
        <fieldset>
          <legend>Special Inputs</legend>
          <input type="file" />
          <br /><br />
          <input type="color" />
          <br /><br />
          <input type="range" />
          <br /><br />
          <input type="hidden" value="123" />
          <br /><br />
          <textarea placeholder="Textarea"></textarea>
        </fieldset>
        <br />
        <button type="submit">Submit Form</button>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 HTML Forms Example</p>
    </footer>
  </body>
</html>
